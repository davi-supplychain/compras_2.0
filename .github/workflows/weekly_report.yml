name: Weekly Report

on:
  schedule:
    - cron: "0 20 * * 5"  # sexta 17h Brasil (20h UTC)
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas

      - name: Run report
        run: python weekly_report.py
